name: PR Age Check

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read

jobs:
  check-age:
    name: "24-Hour Cooldown Check"
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Verify PR Age
        shell: bash
        run: |
          # Use updated_at to ensure cooldown resets after every push/change
          UPDATED_AT="${{ github.event.pull_request.updated_at }}"
          UPDATED_TIME=$(date -d "$UPDATED_AT" +%s)
          CURRENT_TIME=$(date +%s)
          DIFF=$((CURRENT_TIME - UPDATED_TIME))
          REQUIRED_SECONDS=86400 # 24 hours

          if [ "$DIFF" -lt "$REQUIRED_SECONDS" ]; then
            HOURS_LEFT=$(( (REQUIRED_SECONDS - DIFF) / 3600 ))
            MINUTES_LEFT=$(( ((REQUIRED_SECONDS - DIFF) % 3600) / 60 ))
            echo "::error::This PR was modified too recently ($((DIFF / 3600))h ago). Minimum wait is 24h after the last change."
            echo "Please wait another $HOURS_LEFT hours and $MINUTES_LEFT minutes."
            exit 1
          else
            echo "PR age requirement met (Last change was $((DIFF / 3600))h ago)."
          fi
