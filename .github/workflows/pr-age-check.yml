name: PR Age Check

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read

jobs:
  check-age:
    name: "24-Hour Cooldown Check"
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Verify PR Age
        shell: bash
        run: |
          CREATED_AT="${{ github.event.pull_request.created_at }}"
          CREATED_TIME=$(date -d "$CREATED_AT" +%s)
          CURRENT_TIME=$(date +%s)
          DIFF=$((CURRENT_TIME - CREATED_TIME))
          REQUIRED_SECONDS=86400 # 24 hours

          if [ "$DIFF" -lt "$REQUIRED_SECONDS" ]; then
            HOURS_LEFT=$(( (REQUIRED_SECONDS - DIFF) / 3600 ))
            MINUTES_LEFT=$(( ((REQUIRED_SECONDS - DIFF) % 3600) / 60 ))
            echo "::error::This PR is too new to merge ($((DIFF / 3600))h old). Minimum age is 24h."
            echo "Please wait another $HOURS_LEFT hours and $MINUTES_LEFT minutes."
            exit 1
          else
            echo "PR age requirement met (PR is $((DIFF / 3600))h old)."
          fi
