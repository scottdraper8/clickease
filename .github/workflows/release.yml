name: "Release"

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest" # for Arm based macs (M1 and above)
            args: "--target aarch64-apple-darwin"
          - platform: "macos-latest" # for Intel based macs
            args: "--target x86_64-apple-darwin"
          - platform: "ubuntu-24.04"
            args: ""
          - platform: "windows-latest"
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf libdbus-1-dev libglib2.0-dev

      - name: install frontend dependencies
        run: pnpm install

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SKIP_DLL_CHECK: 1
          # Thin AppImage Strategy: Skip problematic libs to force using host drivers
          TAURI_LINUX_DEPLOY_SKIP_LIBS: "libEGL.so.1,libGL.so.1,libGLESv2.so.2,libgbm.so.1,libdrm.so.2,libdbus-1.so.3,libglib-2.0.so.0,libxcb.so.1,libX11.so.6,libXext.so.6,libXrender.so.1,libXcomposite.so.1,libXcursor.so.1,libXdamage.so.1,libXfixes.so.3,libXi.so.6,libXinerama.so.1,libXrandr.so.2,libstdc++.so.6,libjpeg.so.8,libpng16.so.16"
        with:
          tagName: v__VERSION__ # the action automatically replaces \_\_VERSION\_\_ with the app version
          releaseName: "Clickease v__VERSION__"
          releaseBody: "Automated release from CI"
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
