repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: check-json
      - id: check-toml

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        exclude: pnpm-lock.yaml

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier
        files: \.(js|ts|css|html|json|md)$

  - repo: local
    hooks:
      - id: eslint
        name: eslint
        entry: pnpm exec eslint
        language: system
        files: \.ts$

      - id: rustfmt
        name: rustfmt
        entry: bash -c "cd src-tauri && cargo fmt -- --check"
        language: system
        types: [rust]
        pass_filenames: false

      - id: clippy
        name: clippy
        entry: bash -c "cd src-tauri && cargo clippy -- -D warnings"
        language: system
        types: [rust]
        pass_filenames: false
